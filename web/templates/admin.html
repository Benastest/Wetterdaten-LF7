<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ESP32 Admin</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f3f3f3;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 520px;
        margin: auto;
    }

    h1 {
        text-align: center;
        color: #444;
    }

    .card {
        background: white;
        padding: 20px;
        margin-top: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .label {
        font-weight: bold;
    }

    .btn {
        display: inline-block;
        background: #007bff;
        color: #fff;
        padding: 12px 18px;
        border-radius: 8px;
        text-decoration: none;
        margin-top: 15px;
    }

    .btn-red {
        background: #d9534f;
    }

</style>
</head>
<body>

<div class="container">

    <h1>ESP32 Admin</h1>

    <div class="card">
        <p><span class="label">WLAN SSID:</span> {{wlan_ssid}}</p>
        <p><span class="label">IP-Adresse:</span> {{wlan_ip}}</p>
        <p><span class="label">Signalstärke:</span> {{wlan_rssi}} dBm</p>
    </div>

    <div class="card">
        <p><span class="label">Freier Speicher:</span> {{free_ram}} Bytes</p>
        <p><span class="label">Gesamtspeicher:</span> {{total_ram}} Bytes</p>
    </div>

    <div class="card">
        <a href="/reboot" class="btn btn-red">🔄 Gerät neu starten</a>
        <br><br>
        <a href="/" class="btn">⬅ Wetterseite</a>
    </div>

</div>

</body>
</html>
