<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetter Osnabrück</title>

<!-- Automatisches Reload alle 60 Sekunden -->
<meta http-equiv="refresh" content="60">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef2f3;
        color: #222;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 520px;
        margin: auto;
    }

    h1 {
        text-align: center;
        color: #0b626d;
        margin-bottom: 8px;
    }

    .subtitle {
        text-align: center;
        margin-bottom: 25px;
        color: #555;
    }

    .card {
        background: #fff;
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .card h2 {
        margin-top: 0;
    }

    .weather-icon {
        text-align: center;
        margin-bottom: 20px;
    }

    .card p {
        font-size: 20px;
        margin: 10px 0;
    }

    .wifi-box {
        margin-top: 20px;
        padding: 15px;
        background: #e3f6ff;
        border-radius: 10px;
        font-size: 18px;
        border-left: 4px solid #0992c2;
    }

</style>
</head>
<body>

<div class="container">

    <h1>Wetter Osnabrück</h1>
    <p class="subtitle">Live-Daten vom BrightSky (DWD Basis)</p>

    <div class="card">

        <div class="weather-icon">
            {{icon}}
        </div>

        <p>🌡 Temperatur: <strong>{{temperature}} °C</strong></p>
        <p>🌤 Zustand: <strong>{{condition}}</strong></p>
        <p>💨 Wind: <strong>{{wind_speed}} m/s</strong></p>
        <p>💧 Luftfeuchtigkeit: <strong>{{humidity}} %</strong></p>

        <div class="wifi-box">
            <p>📶 WLAN: <strong>{{wlan_ssid}}</strong></p>
            <p>🔌 IP-Adresse: <strong>{{wlan_ip}}</strong></p>
        </div>

    </div>

</div>

</body>
</html>
