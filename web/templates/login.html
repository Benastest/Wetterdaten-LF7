<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body { font-family: Arial; background:#eef2f3; padding:20px; }
.box { max-width:360px; margin:auto; background:#fff; padding:20px; 
       border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.1); }
input { width:100%; padding:10px; margin:8px 0; font-size:16px; }
button { width:100%; padding:12px; background:#1976d2; color:#fff; 
         border:none; border-radius:6px; font-size:18px; }
.error { color:#c62828; margin-bottom:10px; }
</style>
</head>
<body>

<div class="box">
<h2>Admin Login</h2>

{{error_msg}}

<form action="/login" method="POST">
  <input type="text" name="user" placeholder="Benutzername">
  <input type="password" name="pass" placeholder="Passwort">
  <button type="submit">Login</button>
</form>

</div>
</body>
</html>
